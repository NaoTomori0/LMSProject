{% extends "base.html" %}
{% block body %}
<main class="form-signin w-100 m-auto" style="max-width: 380px; margin-top: 100px !important">
    <form action="{{ url_for('auth.sign_in') }}" method="POST">
        <h1 class="h3 mb-4 fw-normal text-center">Create account</h1>
        <div class="form-floating mb-3">
            <input
                type="text"
                name="username"
                class="form-control {% if username_error %}is-invalid{% endif %}"
                id="username"
                placeholder="Username"
                value="{{ username_value|default('') }}"
                required
            >
            <label for="username">Username</label>
            <div class="invalid-feedback">{{ username_error }}</div>
        </div>
        <div class="form-floating mb-3">
            <input
                type="email"
                name="email"
                class="form-control {% if email_error %}is-invalid{% endif %}"
                id="email"
                placeholder="name@example.com"
                value="{{ email_value|default('') }}"
                required
            >
            <label for="email">Email address</label>
            <div class="invalid-feedback">{{ email_error }}</div>
        </div>
        <div class="form-floating mb-3">
            <input
                type="password"
                name="password"
                class="form-control {% if password_error %}is-invalid{% endif %}"
                id="password-field"
                placeholder="Password"
                required
            >
            <label for="password-field">Password</label>
            <div class="invalid-feedback">{{ password_error }}</div>
            <div class="invalid-feedback"></div>
            <div id="password-error" class="text-danger small mt-1" style="display: none;"></div>
        </div>
        <button class="btn btn-primary w-100 py-2 mb-3" type="submit">Sign up</button>
    </form>
    <a href="{{ url_for('auth.google_login') }}" class="w-100 py-2 mb-2 btn btn-outline-secondary d-flex align-items-center justify-content-center">
        <svg
            class="bi me-2"
            width="16"
            height="16"
            fill="currentColor"
        >
            <use xlink:href="#google"/>
        </svg>
        Sign up with Google
    </a>
    <a href="{{ url_for('auth.github_login') }}" class="w-100 py-2 mb-3 btn btn-outline-secondary d-flex align-items-center justify-content-center">
        <svg
            class="bi me-2"
            width="16"
            height="16"
            fill="currentColor"
        >
            <use xlink:href="#github"/>
        </svg>
        Sign up with GitHub
    </a>
    <div class="text-center mt-3">
        <p class="mb-0 text-muted">Already have an account?</p>
        <a href="{{ url_for('auth.log_in') }}" class="text-primary text-decoration-none fw-bold">
            Log in here
        </a>
    </div>
</main>
{% block scripts %}
{{ super() }}
<script src="/static/js/sign-in.js"></script>
{% endblock %}
{% endblock %}
