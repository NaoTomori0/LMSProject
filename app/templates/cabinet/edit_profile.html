{% extends "base.html" %}
{% block body %}
<div class="container" style="max-width: 400px; margin-top: 50px;">
    <h1>Изменить никнейм</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="username" class="form-label">Новый никнейм</label>
            <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                value="{{ current_user.username }}"
                required
            >
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('cabinet.index') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
