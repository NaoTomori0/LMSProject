{% extends "base.html" %}
{% block body %}
<div class="container" style="max-width: 600px;">
  <h1>Редактирование задания «{{ assignment.title }}»</h1>
  <form method="POST">
    <div class="mb-3">
      <label for="title" class="form-label">Название</label>
      <input type="text" class="form-control" id="title" name="title" value="{{ assignment.title }}" required>
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Описание</label>
      <textarea class="form-control" id="description" name="description" rows="4">{{ assignment.description or '' }}</textarea>
    </div>
    <div class="mb-3">
      <label for="check_type" class="form-label">Тип проверки</label>
      <select class="form-select" id="check_type" name="check_type">
        <option value="manual" {% if assignment.check_type == 'manual' %}selected{% endif %}>Ручная</option>
        <option value="auto" {% if assignment.check_type == 'auto' %}selected{% endif %}>Автоматическая (скрипт)</option>
        <option value="quiz" {% if assignment.check_type == 'quiz' %}selected{% endif %}>Тест</option>
      </select>
    </div>

    <!-- Блок выбора скрипта (управление через JS) -->
    <div id="auto-script" style="display: none;">
      <div class="mb-3">
        <label for="script_id" class="form-label">Скрипт проверки (универсальный)</label>
        <select class="form-select" id="script_id" name="script_id">
          <option value="">-- Не выбран --</option>
          {% for s in scripts %}
            <option value="{{ s.id }}" {% if assignment.language_scripts.first() and assignment.language_scripts.first().test_script_id == s.id %}selected{% endif %}>
              {{ s.name }} ({{ s.language }})
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Видимость задания -->
    <div class="mb-3">
      <label class="form-label">Видимость</label>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="visibility" value="public" id="vis-public"
               {% if current_visibility == 'public' %}checked{% endif %}>
        <label class="form-check-label" for="vis-public">Публичное (видят все, включая гостей)</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="visibility" value="authenticated" id="vis-auth"
               {% if current_visibility == 'authenticated' %}checked{% endif %}>
        <label class="form-check-label" for="vis-auth">Только для авторизованных пользователей</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="visibility" value="group" id="vis-group"
               {% if current_visibility == 'group' %}checked{% endif %}>
        <label class="form-check-label" for="vis-group">Только для группы</label>
      </div>
    </div>

    <!-- Выбор группы (управление через JS) -->
    <div id="group-select" class="mb-3" style="display: none;">
      <label for="group_id" class="form-label">Группа</label>
      <select class="form-select" id="group_id" name="group_id">
        <option value="">-- Выберите группу --</option>
        {% for group in groups %}
          <option value="{{ group.id }}" {% if assignment.group_id == group.id %}selected{% endif %}>{{ group.name }}</option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
    <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">Отмена</a>
  </form>
</div>

<script>
  // Элементы
  const checkType = document.getElementById('check_type');
  const autoDiv = document.getElementById('auto-script');
  const radioGroup = document.getElementById('vis-group');
  const groupDiv = document.getElementById('group-select');
  const allVisRadios = document.querySelectorAll('input[name="visibility"]');

  // Логика переключения скриптов
  function toggleAuto() {
    autoDiv.style.display = checkType.value === 'auto' ? 'block' : 'none';
  }

  // Логика переключения выбора группы
  function toggleGroupSelect() {
    groupDiv.style.display = radioGroup.checked ? 'block' : 'none';
  }

  // Навешивание событий
  checkType.addEventListener('change', toggleAuto);
  allVisRadios.forEach(radio => {
    radio.addEventListener('change', toggleGroupSelect);
  });

  // Инициализация при загрузке (синхронизация с данными из БД)
  window.addEventListener('DOMContentLoaded', () => {
    toggleAuto();
    toggleGroupSelect();
  });
</script>
{% endblock %}
