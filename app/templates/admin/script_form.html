{% extends "base.html" %}
{% block body %}
<div class="container" style="max-width: 700px;">
  <h1>{% if script %}Редактирование скрипта{% else %}Новый скрипт{% endif %}</h1>
  <form method="POST">
    <div class="mb-3">
      <label for="name" class="form-label">Название</label>
      <input type="text" class="form-control" id="name" name="name"
             value="{{ script.name if script else '' }}" required>
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Описание</label>
      <textarea class="form-control" id="description" name="description" rows="2">{{ script.description if script else '' }}</textarea>
    </div>
    <div class="mb-3">
      <label for="language" class="form-label">Язык</label>
      <select class="form-select" id="language" name="language">
        <option value="python" {% if script and script.language == 'python' %}selected{% endif %}>Python</option>
        <option value="bash" {% if script and script.language == 'bash' %}selected{% endif %}>Bash</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="script_body" class="form-label">Код скрипта</label>
      <textarea class="form-control font-monospace" id="script_body" name="script_body" rows="12" required>{{ script.script_body if script else '' }}</textarea>
      <div class="form-text">
        Скрипт должен принимать путь к файлу с ответом и выводить в stdout JSON-строку вида
        <code>{"passed": true, "score": 10, "feedback": "комментарий"}</code>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">{% if script %}Сохранить{% else %}Создать{% endif %}</button>
    <a href="{{ url_for('admin.list_scripts') }}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
