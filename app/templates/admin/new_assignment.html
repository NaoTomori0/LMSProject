{% extends "base.html" %} {% block body %}
<div class="container" style="max-width: 600px">
    <h1>Новое задание</h1>
    <form method="POST" id="assignment-form">
        <div class="mb-3">
            <label for="title" class="form-label">Название</label>
            <input
                type="text"
                class="form-control"
                id="title"
                name="title"
                required
            >
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea
                class="form-control"
                id="description"
                name="description"
                rows="4"
            ></textarea>
        </div>
        <div class="mb-3">
            <label for="check_type" class="form-label">Тип проверки</label>
            <select class="form-select" id="check_type" name="check_type">
                <option value="manual">Ручная</option>
                <option value="auto">Автоматическая (скрипт)</option>
                <option value="quiz">Тест</option>
            </select>
        </div>
        <div id="auto-script" style="display: none">
            <div class="mb-3">
                <label for="script_id" class="form-label">
                    Скрипт проверки (универсальный)
                </label
        >
                <select class="form-select" id="script_id" name="script_id">
                    <option value="">-- Не выбран --</option>
                    {% for s in scripts %}
                    <option value="{{ s.id }}">{{ s.name }} ({{ s.language }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Видимость</label>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="public"
                    id="vis-public"
                    checked
                >
                <label class="form-check-label" for="vis-public">
                    Публичное (видят все, включая гостей)
                </label
        >
            </div>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="authenticated"
                    id="vis-auth"
                >
                <label class="form-check-label" for="vis-auth">
                    Только для авторизованных пользователей
                </label
        >
            </div>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="group"
                    id="vis-group"
                >
                <label class="form-check-label" for="vis-group">
                    Только для группы
                </label
        >
            </div>
        </div>
        <div id="group-select" class="mb-3" style="display: none">
            <label for="group_id" class="form-label">Группа</label>
            <select class="form-select" id="group_id" name="group_id">
                <option value="">-- Выберите группу --</option>
                {% for group in groups %}
                <option value="{{ group.id }}">{{ group.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="deadline" class="form-label">
                    Дедлайн (локальное время)
                </label
        >
                <input
                    type="datetime-local"
                    class="form-control"
                    id="deadline"
                    name="deadline"
                >
                <div class="form-text">
                    Оставьте пустым, если без ограничения. Будет сохранён в UTC.
                </div>
            </div>
            <div class="col-md-6">
                <label for="max_attempts" class="form-label">Максимум попыток</label>
                <input
                    type="number"
                    class="form-control"
                    id="max_attempts"
                    name="max_attempts"
                    min="0"
                    value="0"
                >
                <div class="form-text">0 — без ограничений.</div>
            </div>
        </div>
        <div id="quiz-section" style="display: none">
            <h5 class="mt-4">Вопросы теста</h5>
            <div id="questions-container"></div>
            <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addQuestion()">
                + Добавить вопрос
            </button>
        </div>
        <button type="submit" class="btn btn-primary mt-4">Создать</button>
        <a href="{{ url_for('admin.index') }}" class="btn btn-secondary mt-4">
            Отмена
        </a
    >
    </form>
</div>
{% endblock %} {% block scripts %} {{ super() }}
<script>
  // ==================== Работа с часовым поясом для дедлайна ====================
  function getUTCOffsetMinutes() {
    const match = document.cookie.match(/(?:^|;\s*)timezone_offset=([^;]*)/);
    return match ? parseInt(match[1]) : -new Date().getTimezoneOffset();
  }

  // Преобразуем локальное время из поля в UTC и записываем обратно
  function convertDeadlineToUTC() {
    const input = document.getElementById("deadline");
    if (!input.value) return;
    const localDate = new Date(input.value);
    if (isNaN(localDate)) return;
    const offsetMinutes = getUTCOffsetMinutes();
    // Правильно: UTC = local - offset (а не local + offset)
    const utcDate = new Date(localDate.getTime() - offsetMinutes * 60000);
    const yyyy = utcDate.getUTCFullYear();
    const mm = String(utcDate.getUTCMonth() + 1).padStart(2, "0");
    const dd = String(utcDate.getUTCDate()).padStart(2, "0");
    const hh = String(utcDate.getUTCHours()).padStart(2, "0");
    const min = String(utcDate.getUTCMinutes()).padStart(2, "0");
    input.value = `${yyyy}-${mm}-${dd}T${hh}:${min}`;
}

  const form = document.getElementById("assignment-form");
  form.addEventListener("submit", convertDeadlineToUTC);

  // ==================== Логика переключения блоков ====================
  const checkType = document.getElementById("check_type");
  const autoDiv = document.getElementById("auto-script");
  const quizSection = document.getElementById("quiz-section");

  function toggleTypeBlocks() {
    autoDiv.style.display = checkType.value === "auto" ? "block" : "none";
    quizSection.style.display = checkType.value === "quiz" ? "block" : "none";
  }
  checkType.addEventListener("change", toggleTypeBlocks);
  window.addEventListener("DOMContentLoaded", toggleTypeBlocks);

  const radioPublic = document.getElementById("vis-public");
  const radioAuth = document.getElementById("vis-auth");
  const radioGroup = document.getElementById("vis-group");
  const groupDiv = document.getElementById("group-select");

  function toggleGroupSelect() {
    groupDiv.style.display = radioGroup.checked ? "block" : "none";
  }
  radioPublic.addEventListener("change", toggleGroupSelect);
  radioAuth.addEventListener("change", toggleGroupSelect);
  radioGroup.addEventListener("change", toggleGroupSelect);
  window.addEventListener("DOMContentLoaded", toggleGroupSelect);

  // ==================== Конструктор вопросов ====================
  let questionIndex = 0;

  function updateOptionsForQuestion(card) {
    const typeSelect = card.querySelector('select[name="question_type"]');
    if (!typeSelect) return;
    const currentType = typeSelect.value;
    const container = card.querySelector('[class*="options-container-"]');
    if (!container) return;
    const qIdxMatch = container.className.match(/options-container-(\d+)/);
    if (!qIdxMatch) return;
    const qIdx = qIdxMatch[1];
    const optionGroups = container.querySelectorAll(".input-group");
    optionGroups.forEach((group, optIdx) => {
      const input = group.querySelector(
        "input[type=radio], input[type=checkbox]",
      );
      if (!input) return;
      const newType = currentType === "single" ? "radio" : "checkbox";
      const newName =
        "option_correct_" + qIdx + (newType === "checkbox" ? "[]" : "");
      input.type = newType;
      input.name = newName;
      if (newType === "radio") {
        input.checked = false;
      }
    });
  }

  function addQuestion() {
    const container = document.getElementById("questions-container");
    const idx = questionIndex++;
    const card = document.createElement("div");
    card.className = "card mb-3";
    card.innerHTML = `
      <div class="card-body">
        <div class="mb-2">
          <label>Текст вопроса</label>
          <input type="text" class="form-control" name="question_text" required>
        </div>
        <div class="mb-2">
          <label>Тип</label>
          <select class="form-select" name="question_type">
            <option value="single">Один вариант</option>
            <option value="multiple">Несколько вариантов</option>
            <option value="open">Развёрнутый ответ</option>
          </select>
        </div>
        <div class="mb-2">
          <label>Баллы за вопрос</label>
          <input type="number" class="form-control" name="question_score" min="0" step="0.1" value="1.0" required>
        </div>
        <div class="options-container-${idx} mb-2"></div>
        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addOption(this, ${idx})">+ Вариант</button>
        <button type="button" class="btn btn-sm btn-danger float-end" onclick="this.closest('.card').remove()">Удалить вопрос</button>
      </div>
    `;
    const typeSelect = card.querySelector('select[name="question_type"]');
    if (typeSelect) {
      typeSelect.addEventListener("change", () =>
        updateOptionsForQuestion(card),
      );
    }
    container.appendChild(card);
  }

  function addOption(btn, qIdx) {
    const card = btn.closest(".card");
    const typeSelect = card.querySelector('select[name="question_type"]');
    const currentType = typeSelect ? typeSelect.value : "single";
    const container = card.querySelector(`.options-container-${qIdx}`);
    const optIdx = container.children.length;

    const div = document.createElement("div");
    div.className = "input-group mb-1";
    const inputType = currentType === "single" ? "radio" : "checkbox";
    const inputName =
      "option_correct_" + qIdx + (inputType === "checkbox" ? "[]" : "");

    div.innerHTML = `
      <input type="text" class="form-control" name="option_text_${qIdx}[]" placeholder="Текст варианта">
      <div class="input-group-text">
        <input type="${inputType}" name="${inputName}" value="${optIdx}">
      </div>
      <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.input-group').remove()">×</button>
    `;
    container.appendChild(div);
  }
</script>
{% endblock %}
