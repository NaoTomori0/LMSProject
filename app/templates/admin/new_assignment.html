{% extends "base.html" %}

{% block body %}
<div class="container" style="max-width: 600px">
    <h1>Новое задание</h1>
    <form method="POST" id="assignment-form">
        <div class="mb-3">
            <label for="title" class="form-label">Название</label>
            <input
                type="text"
                class="form-control"
                id="title"
                name="title"
                required
            >
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea
                class="form-control auto-resize"
                id="description"
                name="description"
                rows="2"
            ></textarea>
        </div>
        <div class="mb-3">
            <label for="check_type" class="form-label">Тип проверки</label>
            <select class="form-select" id="check_type" name="check_type">
                <option value="manual">Ручная</option>
                <option value="auto">Автоматическая (скрипт)</option>
                <option value="quiz">Тест</option>
            </select>
        </div>
        <div id="auto-script" style="display: none">
            <div class="mb-3">
                <label for="script_id" class="form-label">Скрипт проверки (универсальный)</label>
                <select class="form-select" id="script_id" name="script_id">
                    <option value="">-- Не выбран --</option>
                    {% for s in scripts %}
                    <option value="{{ s.id }}">{{ s.name }} ({{ s.language }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Видимость</label>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="public"
                    id="vis-public"
                    checked
                >
                <label class="form-check-label" for="vis-public">Публичное (видят все, включая гостей)</label>
            </div>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="authenticated"
                    id="vis-auth"
                >
                <label class="form-check-label" for="vis-auth">Только для авторизованных пользователей</label>
            </div>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="group"
                    id="vis-group"
                >
                <label class="form-check-label" for="vis-group">Только для группы</label>
            </div>
        </div>
        <div id="group-select" class="mb-3" style="display: none">
            <label for="group_id" class="form-label">Группа</label>
            <select class="form-select" id="group_id" name="group_id">
                <option value="">-- Выберите группу --</option>
                {% for group in groups %}
                <option value="{{ group.id }}">{{ group.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="deadline" class="form-label">Дедлайн (дата)</label>
                <input
                    type="date"
                    class="form-control"
                    id="deadline"
                    name="deadline"
                >
                <div class="form-text">Оставьте пустым, если без ограничения.</div>
            </div>
            <div class="col-md-6">
                <label for="max_attempts" class="form-label">Максимум попыток</label>
                <input
                    type="number"
                    class="form-control"
                    id="max_attempts"
                    name="max_attempts"
                    min="0"
                    value="0"
                >
                <div class="form-text">0 — без ограничений.</div>
            </div>
        </div>
        <div id="quiz-section" style="display: none">
            <h5 class="mt-4">Вопросы теста</h5>
            <div id="questions-container"></div>
            <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addQuestion()">+ Добавить вопрос</button>
        </div>
        <button type="submit" class="btn btn-primary mt-4">Создать</button>
        <a href="{{ url_for('admin.index') }}" class="btn btn-secondary mt-4">Отмена</a>
    </form>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<style>
    /* Авто-высота для textarea */
    .auto-resize {
        overflow-y: hidden;
        transition: height 0.1s ease;
    }
</style>
<script src="/static/js/admin/new_assignment.js"></script>
{% endblock %}
