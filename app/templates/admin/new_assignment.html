{% extends "base.html" %}
{% block body %}
<div class="container" style="max-width: 600px;">
    <h1>Новое задание</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="title" class="form-label">Название</label>
            <input
                type="text"
                class="form-control"
                id="title"
                name="title"
                required
            >
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea
                class="form-control"
                id="description"
                name="description"
                rows="4"
            ></textarea>
        </div>
        <div class="mb-3">
            <label for="check_type" class="form-label">Тип проверки</label>
            <select class="form-select" id="check_type" name="check_type">
                <option value="manual">Ручная</option>
                <option value="auto">Автоматическая (скрипт)</option>
                <option value="quiz">Тест</option>
            </select>
        </div>
        <!-- Блок выбора скрипта (только для auto) -->
        <div id="auto-script" style="display:none;">
            <div class="mb-3">
                <label for="script_id" class="form-label">Скрипт проверки (универсальный)</label>
                <select class="form-select" id="script_id" name="script_id">
                    <option value="">-- Не выбран --</option>
                    {% for s in scripts %}
                    <option value="{{ s.id }}">{{ s.name }} ({{ s.language }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <!-- Видимость задания -->
        <div class="mb-3">
            <label class="form-label">Видимость</label>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="public"
                    id="vis-public"
                    checked
                >
                <label class="form-check-label" for="vis-public">Публичное (видят все, включая гостей)</label>
            </div>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="authenticated"
                    id="vis-auth"
                >
                <label class="form-check-label" for="vis-auth">Только для авторизованных пользователей</label>
            </div>
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="group"
                    id="vis-group"
                >
                <label class="form-check-label" for="vis-group">Только для группы</label>
            </div>
        </div>
        <!-- Выбор группы (показывается при выборе "Только для группы") -->
        <div id="group-select" class="mb-3" style="display:none;">
            <label for="group_id" class="form-label">Группа</label>
            <select class="form-select" id="group_id" name="group_id">
                <option value="">-- Выберите группу --</option>
                {% for group in groups %}
                <option value="{{ group.id }}">{{ group.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Создать</button>
        <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
<script>
  // Переключение блока скрипта
  const checkType = document.getElementById('check_type');
  const autoDiv = document.getElementById('auto-script');
  function toggleAuto() {
    autoDiv.style.display = checkType.value === 'auto' ? 'block' : 'none';
  }
  checkType.addEventListener('change', toggleAuto);
  window.addEventListener('DOMContentLoaded', toggleAuto);

  // Переключение видимости: показываем выбор группы только при "group"
  const radioPublic = document.getElementById('vis-public');
  const radioAuth = document.getElementById('vis-auth');
  const radioGroup = document.getElementById('vis-group');
  const groupDiv = document.getElementById('group-select');
  function toggleGroupSelect() {
    groupDiv.style.display = radioGroup.checked ? 'block' : 'none';
  }
  radioPublic.addEventListener('change', toggleGroupSelect);
  radioAuth.addEventListener('change', toggleGroupSelect);
  radioGroup.addEventListener('change', toggleGroupSelect);
  window.addEventListener('DOMContentLoaded', toggleGroupSelect);
</script>
{% endblock %}
